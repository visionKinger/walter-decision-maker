name: Daily Decision Report

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m src.main

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: data/daily_report/*.md
          if-no-files-found: warn

      - name: Email final report
        if: ${{ success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: true
          subject: Daily Decision Report - ${{ github.repository }} - ${{ github.run_number }}
          to: hhz110@vip.qq.com
          from: Walter Decision Maker <${{ secrets.SMTP_USERNAME }}>
          body: |
            Daily report generated successfully.

            Repository: ${{ github.repository }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}
          attachments: data/daily_report/*.md
